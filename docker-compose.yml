services:
  catalog-api:
    build:
      context: .
      dockerfile: src/Catalog/Catalog.API/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogDb: Server=catalog-db,1433;Database=CatalogDb;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "5001:8080"
    depends_on:
      catalog-db:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-api:
    build:
      context: .
      dockerfile: src/Order/Order.API/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderDb: Server=order-db,1433;Database=OrderDb;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True
      RabbitMq__Host: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "5002:8080"
    depends_on:
      order-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  catalog-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Your_strong_password123
    ports:
      - "14331:1433"
    volumes:
      - catalog-db-data:/var/opt/mssql

  order-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Your_strong_password123
    ports:
      - "14332:1433"
    volumes:
      - order-db-data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  catalog-db-data:
  order-db-data:
  rabbitmq-data:
